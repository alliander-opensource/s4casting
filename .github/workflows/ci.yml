name: continuous-integration-checks

on:
  push:
    branches:    
      - '*' 
  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  python-checks:
    runs-on:
      group: managed
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      # actions/setup-python is not on the enterprise action allowlist, so we
      # install uv via its standalone installer (no Python needed) and let uv
      # provision the interpreter itself.
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Dependencies
        run: |
          uv python install ${{ matrix.python-version }}
          uv sync

      - name: Check
        run: |
          make check
